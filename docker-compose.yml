services:
  lichess-bot:
    build: .
    container_name: lichess-bot
    restart: unless-stopped
    environment:
      - LICHESS_TOKEN=${LICHESS_TOKEN}
      - PYTHONUNBUFFERED=1

  openbench:
    build:
      context: .
      dockerfile: Dockerfile.openbench
    container_name: openbench
    restart: unless-stopped
    environment:
      - OPENBENCH_ADMIN_USER=${OPENBENCH_ADMIN_USER}
      - OPENBENCH_ADMIN_PASS=${OPENBENCH_ADMIN_PASS}
    volumes:
      - openbench-data:/app/db

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: openbench-worker
    restart: unless-stopped
    environment:
      - OPENBENCH_USERNAME=${OPENBENCH_ADMIN_USER}
      - OPENBENCH_PASSWORD=${OPENBENCH_ADMIN_PASS}
      - OPENBENCH_SERVER=https://bench.likeawizard.dev
      - PYTHONUNBUFFERED=1
    command: ["-T", "${WORKER_THREADS:-4}", "-N", "1"]
    profiles:
      - worker

  worker-manager:
    build:
      context: ./worker-manager
    container_name: worker-manager
    restart: unless-stopped
    environment:
      - HCLOUD_TOKEN=${HCLOUD_TOKEN}
      - HCLOUD_SERVER_TYPE=${HCLOUD_SERVER_TYPE:-cpx32}
      - HCLOUD_WORKER_COUNT=${HCLOUD_WORKER_COUNT:-1}
      - HCLOUD_LOCATION=${HCLOUD_LOCATION:-fsn1}
      - HCLOUD_SSH_KEY=${HCLOUD_SSH_KEY:-}
      - POLL_INTERVAL=${POLL_INTERVAL:-60s}
      - COOLDOWN=${COOLDOWN:-5m}
      - OPENBENCH_URL=http://openbench:8000
      - OPENBENCH_USERNAME=${OPENBENCH_WORKER_USER}
      - OPENBENCH_PASSWORD=${OPENBENCH_WORKER_PASS}
      - CLOUD_CONFIG_PATH=/config/worker-cloud-config.yml
    volumes:
      - ./worker-cloud-config.yml:/config/worker-cloud-config.yml:ro
    profiles:
      - worker-manager

volumes:
  openbench-data:
  caddy-data:
  caddy-config:
