services:
  lichess-bot:
    build: .
    container_name: lichess-bot
    restart: unless-stopped
    environment:
      - LICHESS_TOKEN=${LICHESS_TOKEN}
      - PYTHONUNBUFFERED=1

  openbench:
    build:
      context: .
      dockerfile: Dockerfile.openbench
    container_name: openbench
    restart: unless-stopped
    environment:
      - OPENBENCH_ADMIN_USER=${OPENBENCH_ADMIN_USER}
      - OPENBENCH_ADMIN_PASS=${OPENBENCH_ADMIN_PASS}
    volumes:
      - openbench-data:/app/db

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

  server-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: openbench-server-worker
    restart: unless-stopped
    environment:
      - OPENBENCH_USERNAME=${OPENBENCH_ADMIN_USER}
      - OPENBENCH_PASSWORD=${OPENBENCH_ADMIN_PASS}
      - OPENBENCH_SERVER=https://bench.likeawizard.dev
      - PYTHONUNBUFFERED=1
    command: ["-T", "${SERVER_WORKER_THREADS:-2}", "-N", "1"]

  worker-scaler:
    image: docker:cli
    container_name: worker-scaler
    restart: unless-stopped
    depends_on:
      - server-worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker-scaler.sh:/worker-scaler.sh:ro
      - /opt/tofiks-infra:/compose:ro
    entrypoint: ["/bin/sh", "/worker-scaler.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: openbench-worker
    restart: unless-stopped
    environment:
      - OPENBENCH_USERNAME=${OPENBENCH_ADMIN_USER}
      - OPENBENCH_PASSWORD=${OPENBENCH_ADMIN_PASS}
      - OPENBENCH_SERVER=https://bench.likeawizard.dev
      - PYTHONUNBUFFERED=1
    command: ["-T", "${WORKER_THREADS:-4}", "-N", "1"]
    profiles:
      - worker

volumes:
  openbench-data:
  caddy-data:
  caddy-config:
