name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - bot
          - bench
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET: ${{ github.event.client_payload.target || github.event.inputs.target || 'all' }}
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
          OPENBENCH_ADMIN_USER: ${{ secrets.OPENBENCH_ADMIN_USER }}
          OPENBENCH_ADMIN_PASS: ${{ secrets.OPENBENCH_ADMIN_PASS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          envs: TARGET,LICHESS_TOKEN,OPENBENCH_ADMIN_USER,OPENBENCH_ADMIN_PASS
          script: |
            cd /opt/tofiks-infra
            git pull --recurse-submodules
            printf "LICHESS_TOKEN=%s\nOPENBENCH_ADMIN_USER=%s\nOPENBENCH_ADMIN_PASS=%s\n" "$LICHESS_TOKEN" "$OPENBENCH_ADMIN_USER" "$OPENBENCH_ADMIN_PASS" > .env
            if [ "$TARGET" = "bot" ]; then docker compose up -d --build lichess-bot; elif [ "$TARGET" = "bench" ]; then docker compose up -d --build openbench caddy server-worker; else docker compose up -d --build; fi
            docker image prune -f
