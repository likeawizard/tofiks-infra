name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - bot
          - bench
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/tofiks-infra
            git pull --recurse-submodules
            cat > .env <<EOF
            LICHESS_TOKEN=${{ secrets.LICHESS_TOKEN }}
            OPENBENCH_ADMIN_USER=${{ secrets.OPENBENCH_ADMIN_USER }}
            OPENBENCH_ADMIN_PASS=${{ secrets.OPENBENCH_ADMIN_PASS }}
            EOF

            TARGET="${{ github.event.client_payload.target || github.event.inputs.target || 'all' }}"
            case "$TARGET" in
              bot)   docker compose up -d --build lichess-bot ;;
              bench) docker compose up -d --build openbench caddy ;;
              all)   docker compose up -d --build ;;
            esac
            docker image prune -f
