#cloud-config
#
# Ephemeral OpenBench Worker for Hetzner
# =======================================
#
# Usage:
#   1. Create a dedicated (non-admin) OpenBench account at https://bench.likeawizard.dev
#      Do NOT reuse your admin credentials — this config is visible in the Hetzner console.
#
#   2. Edit the variables below (OPENBENCH_USERNAME, OPENBENCH_PASSWORD, WORKER_THREADS).
#
#   3. In Hetzner Cloud console, create a new server:
#      - Image: Docker CE (under Apps)
#      - Server type: pick based on how many threads you want
#      - Paste this entire file into the "Cloud config" field
#      - Create server
#
#   4. The server will automatically:
#      - Clone the repo and build the worker Docker image (~2-3 min)
#      - Connect to OpenBench and start running tests
#      - Shut down when there's no more work (--fleet mode)
#
#   5. IMPORTANT: After the server shuts down, DELETE it from the Hetzner panel.
#      Powered-off servers still incur (reduced) charges for disk storage.
#
#   You can create as many servers as you like with this same cloud-config.
#

write_files:
  - path: /opt/worker/.env
    content: |
      OPENBENCH_USERNAME=worker
      OPENBENCH_PASSWORD=CHANGE_ME
      OPENBENCH_SERVER=https://bench.likeawizard.dev
      WORKER_THREADS=auto
    permissions: "0600"

  - path: /opt/worker/run.sh
    content: |
      #!/bin/bash
      set -e

      cd /opt/worker/tofiks-infra

      # Build and run the worker (blocks until worker exits)
      docker compose -f docker-compose.worker.yml up --build

      # Worker exited (fleet mode: no more work) — shut down the server
      shutdown -h now
    permissions: "0755"

runcmd:
  - git clone --recurse-submodules https://github.com/likeawizard/tofiks-infra.git /opt/worker/tofiks-infra
  - cp /opt/worker/.env /opt/worker/tofiks-infra/.env
  - /opt/worker/run.sh
